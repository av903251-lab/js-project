<!DOCTYPE html>
<meta name="robots" content="noindex">
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlexDev | Web Portfolio</title>
    <style>
        body { transition: 0.5s; margin: 0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        
        /* Светлая тема */
        body.light { background-color: #f5f5f5; color: #333; }
        /* Темная тема */
        body.dark { background-color: #1a1a1a; color: #f5f5f5; }

        .content { text-align: center; max-width: 600px; padding: 20px; }
        .theme-toggle { background: #6c5ce7; color: white; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-size: 18px; margin-top: 20px; box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4); }
        .theme-toggle:hover { opacity: 0.9; }
        
        .nav { position: fixed; top: 20px; right: 20px; }
    </style>
</head>
<body class="light">

    <div class="nav">
        <button class="theme-toggle" id="toggle">Сменить тему</button>
    </div>

    <div class="content">
        <h1 id="greeting">Добрый день!</h1>
        <p>Я Александр, разработчик из Перми. Создаю сайты на JavaScript и ботов на Python.</p>
        <p>Этот проект демонстрирует работу с переключением состояний UI и хранением настроек в браузере.</p>
    </div>

<script>
    const toggleBtn = document.getElementById('toggle');
    const body = document.body;
    const greeting = document.getElementById('greeting');

    // 1. Проверяем тему
    const currentTheme = localStorage.getItem('theme');
    if (currentTheme === 'dark') {
        body.classList.replace('light', 'dark');
        toggleBtn.innerText = "Включить день";
    }

    // 2.Логика
    toggleBtn.addEventListener('click', () => {
        if (body.classList.contains('light')) {
            body.classList.replace('light', 'dark');
            localStorage.setItem('theme', 'dark');
            toggleBtn.innerText = "Включить день";
        } else {
            body.classList.replace('dark', 'light');
            localStorage.setItem('theme', 'light');
            toggleBtn.innerText = "Включить ночь";
        }
    });

    // 3.приветствие на JS
    const hour = new Date().getHours();
    if (hour < 12) greeting.innerText = "Доброе утро!";
    else if (hour < 18) greeting.innerText = "Добрый день!";
    else greeting.innerText = "Добрый вечер!";
</script>

</body>
</html>
</html>
